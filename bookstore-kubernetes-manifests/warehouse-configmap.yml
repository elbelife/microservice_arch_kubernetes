kind: ConfigMap
apiVersion: v1
metadata:
  name: warehouse
  namespace: bookstore-microservices
data:
  application.yaml: |-
    database: hsqldb

    spring:
      application:
        name: warehouse
      sql:
        init:
          schema-locations: "classpath:db/${database}/schema.sql"
          data-locations: "classpath:db/${database}/data.sql"
          encoding: UTF-8
          mode: always
      jpa:
        show-sql: false
        hibernate:
          ddl-auto: none
        open-in-view: false
      resources:
        chain:
          compressed: true
          cache: true
        cache:
          period: 86400

    feign:
      oauth2:
        token-uri: http://security/oauth/token
        client-id: warehouse
        client-secret: warehouse_secret

    logging:
      pattern:
        console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(-){faint} %clr([%t]){faint} %clr(%-40logger{39}){cyan}[%line]%clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"
      level:
        root: INFO

    server:
      port: ${PORT:80}
