apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-microservices-domain-warehouse
  namespace: bookstore-microservices
  labels:
    app: warehouse
spec:
  replicas: 1 # Consider increasing for production
  selector:
    matchLabels:
      app: warehouse
  template:
    metadata:
      labels:
        app: warehouse
    spec:
      containers:
        - name: warehouse
          image: icyfenix/bookstore-kubernetes-domain-warehouse
          imagePullPolicy: IfNotPresent # Added for clarity and control
          ports:
            - name: http-server
              containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          volumeMounts:
            - name: config-volume
              mountPath: /config
          resources: # Added resource requests and limits
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe: # Added liveness probe
            httpGet:
              path: /health # Adjust path if different (e.g., /actuator/health/liveness)
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe: # Added readiness probe
            httpGet:
              path: /health # Adjust path if different (e.g., /actuator/health/readiness)
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext: # Added security context
            runAsNonRoot: true
            runAsUser: 1000 # Example user ID, ensure this user exists in your container image
      volumes:
        - name: config-volume
          configMap:
            name: warehouse
