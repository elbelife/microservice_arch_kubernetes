apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-microservices-platform-gateway
  namespace: bookstore-microservices
  labels:
    app: gateway
spec:
  replicas: 1 # Consider increasing for production
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: icyfenix/bookstore-kubernetes-platform-gateway
          imagePullPolicy: IfNotPresent # Added for clarity and control
          ports:
            - name: http-server
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          volumeMounts:
            - name: config-volume
              mountPath: /config
          resources: # Added resource requests and limits
            requests:
              cpu: "300m" # Slightly higher for a gateway
              memory: "768Mi"
            limits:
              cpu: "800m"
              memory: "1.5Gi"

      volumes:
        - name: config-volume
          configMap:
            name: gateway
