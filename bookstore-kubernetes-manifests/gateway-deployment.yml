apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-microservices-platform-gateway
  namespace: bookstore-microservices
  labels:
    app: gateway
spec:
  replicas: 1 # Consider increasing for production
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: icyfenix/bookstore-kubernetes-platform-gateway
          imagePullPolicy: IfNotPresent # Added for clarity and control
          ports:
            - name: http-server
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          volumeMounts:
            - name: config-volume
              mountPath: /config
          resources: # Added resource requests and limits
            requests:
              cpu: "300m" # Slightly higher for a gateway
              memory: "768Mi"
            limits:
              cpu: "800m"
              memory: "1.5Gi"
          livenessProbe: # Added liveness probe
            httpGet:
              path: /health # Adjust path if different (e.g., /actuator/health/liveness)
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe: # Added readiness probe
            httpGet:
              path: /health # Adjust path if different (e.g., /actuator/health/readiness)
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext: # Added security context
            runAsNonRoot: true
            runAsUser: 1000 # Example user ID, ensure this user exists in your container image
      volumes:
        - name: config-volume
          configMap:
            name: gateway
